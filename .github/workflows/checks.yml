name: Checks

on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    - cron: '0 0 * * *'

jobs:
  php-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        environment:
          - php_version: 8.3
          - php_version: 8.4
          - php_version: 8.5

    name: Test on PHP ${{ matrix.environment.php_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          php_version: ${{ matrix.environment.php_version }}

      - name: Execute tests
        run: composer test

  php-codesniffer:
    runs-on: ubuntu-latest
    name: PHP Codesniffer

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          php_version: ${{ matrix.environment.php_version }}

      - name: Run codesniffer
        run: composer phpcs

  php-mess-detector:
    runs-on: ubuntu-latest
    name: PHP Mess Detector

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          php_version: ${{ matrix.environment.php_version }}

      - name: Run mess detector
        run: composer phpmd

  rector:
    runs-on: ubuntu-latest
    name: Rector

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          php_version: ${{ matrix.environment.php_version }}

      - name: Run Rector
        run: composer rector

  larastan:
    runs-on: ubuntu-latest
    name: Larastan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          php_version: ${{ matrix.environment.php_version }}

      - name: Run Larastan
        run: composer larastan
