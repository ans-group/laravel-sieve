services:
  php83:
    container_name: sieve-package-php83
    build:
      context: .
      dockerfile: .docker/php83/Dockerfile
      args:
        - SSH_PRIVATE_KEY
    volumes:
      - './:/app'
    networks:
      - sieve-package
    extra_hosts:
      - "host..xdebug.internal:host-gateway"
  php84:
    container_name: sieve-package-php84
    build:
      context: .
      dockerfile: .docker/php84/Dockerfile
      args:
        - SSH_PRIVATE_KEY
    volumes:
      - './:/app'
    networks:
      - sieve-package
    extra_hosts:
      - "host..xdebug.internal:host-gateway"
  php85:
    container_name: sieve-package-php85
    build:
      context: .
      dockerfile: .docker/php85/Dockerfile
      args:
        - SSH_PRIVATE_KEY
    volumes:
      - './:/app'
    networks:
      - sieve-package
    extra_hosts:
      - "host..xdebug.internal:host-gateway"

networks:
  sieve-package:
    name: ${SIEVE_PACKAGE_NETWORK:-sieve-package}

